name: Build and Release (Windows & Linux)
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Make Gradlew Executable
        shell: bash
        run: chmod +x gradlew

      - name: Build All Formats
        shell: bash
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-artifacts-${{ matrix.os }}
          # PRECISION FIX: Only upload files from specific format folders, skipping the 'app' folder
          path: |
            **/build/compose/binaries/main-release/msi/*.msi
            **/build/compose/binaries/main-release/exe/*.exe
            **/build/compose/binaries/main-release/deb/*.deb
            **/build/compose/binaries/main-release/rpm/*.rpm
            **/build/compose/binaries/main-release/zip/*.zip
          if-no-files-found: warn
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-files
          pattern: app-artifacts-*
          merge-multiple: false

      - name: Flatten and Prepare Assets
        run: |
          mkdir -p final-assets
          
          # Target only specific installer extensions and exclude any internal 'runtime' or 'app' paths
          # This prevents java.exe or generic dlls from being sucked in.
          find downloaded-files -type f \( \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.flatpak" -o \
            -name "*.AppImage" \
          \) -exec cp -v {} final-assets/ \;
          
          # Setup structure for Nucleus Metadata Generator
          mkdir -p final-assets/release-assets-Windows
          mkdir -p final-assets/release-assets-Linux
          
          # Sort files into OS folders for the generator
          mv final-assets/*.{msi,exe} final-assets/release-assets-Windows/ 2>/dev/null || true
          mv final-assets/*.{deb,rpm,flatpak,AppImage} final-assets/release-assets-Linux/ 2>/dev/null || true
          # Zip files could be either; we'll copy to both or handle specifically if needed
          cp final-assets/*.zip final-assets/release-assets-Windows/ 2>/dev/null || true
          cp final-assets/*.zip final-assets/release-assets-Linux/ 2>/dev/null || true

      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: final-assets
          version: ${{ github.ref_name }}

      - name: Move Metadata to Root
        run: |
          if [ -d "final-assets/update-yml" ]; then
            mv final-assets/update-yml/*.yml final-assets/
          fi
          # Clean up temporary structuring folders
          rm -rf final-assets/release-assets-Windows
          rm -rf final-assets/release-assets-Linux
          rm -rf final-assets/update-yml
          
          echo "--- Final Assets List ---"
          ls -R final-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: final-assets/*
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}