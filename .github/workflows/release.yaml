name: Build and Release (Windows & Linux)
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Make Gradlew Executable
        shell: bash
        run: chmod +x gradlew

      - name: Build All Formats
        shell: bash
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-artifacts-${{ matrix.os }}
          # Path globbing: grabs only the final installers, avoids the 'app' folder (java.exe)
          path: |
            **/build/compose/binaries/main-release/msi/*.msi
            **/build/compose/binaries/main-release/exe/*.exe
            **/build/compose/binaries/main-release/deb/*.deb
            **/build/compose/binaries/main-release/rpm/*.rpm
            **/build/compose/binaries/main-release/zip/*.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-files
          pattern: app-artifacts-*
          merge-multiple: false

      - name: Flatten and Prepare Assets
        run: |
          mkdir -p final-assets
          
          # 1. Extract every valid installer from the downloaded artifacts into final-assets
          find downloaded-files -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -o -name "*.AppImage" \) -exec cp -v {} final-assets/ \;
          
          # 2. Create the temporary structure Nucleus needs to generate update YMLs
          mkdir -p temp-metadata/release-assets-Windows
          mkdir -p temp-metadata/release-assets-Linux
          
          # 3. Copy files to the metadata folders (using cp so original stays in final-assets)
          # We use patterns to ensure Windows stays with Windows and Linux with Linux
          cp final-assets/*win* temp-metadata/release-assets-Windows/ 2>/dev/null || true
          cp final-assets/*linux* temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*amd64* temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*x86_64* temp-metadata/release-assets-Linux/ 2>/dev/null || true

      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: temp-metadata
          version: ${{ github.ref_name }}

      - name: Move Metadata and Cleanup
        run: |
          # Move the generated YMLs into the final-assets folder
          if [ -d "temp-metadata/update-yml" ]; then
            mv temp-metadata/update-yml/*.yml final-assets/
          fi
          
          # Clean up the temp processing folder
          rm -rf temp-metadata
          
          echo "--- Content of final-assets to be released ---"
          ls -F final-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: final-assets/*
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}