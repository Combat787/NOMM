name: Build and Release (Final)
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Build All Formats
        run: |
          chmod +x gradlew
          ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.os }}
          # THE FIX: We explicitly list the subfolders. 
          # This avoids "main-release/app/", which is where java.exe lives.
          path: |
            **/build/compose/binaries/main-release/msi/*.msi
            **/build/compose/binaries/main-release/exe/*.exe
            **/build/compose/binaries/main-release/portable/*.exe
            **/build/compose/binaries/main-release/deb/*.deb
            **/build/compose/binaries/main-release/rpm/*.rpm
            **/build/compose/binaries/main-release/zip/*.zip
            **/build/compose/binaries/main-release/appimage/*.AppImage
            **/build/compose/binaries/main-release/flatpak/*.flatpak
          if-no-files-found: warn

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-files
          pattern: app-artifacts-*

      - name: Flatten and Sort
        run: |
          mkdir -p final-assets
          mkdir -p temp-metadata/release-assets-Windows
          mkdir -p temp-metadata/release-assets-Linux
          
          # 1. Move everything to the flat final-assets folder
          find downloaded-files -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -o -name "*.AppImage" \) -exec cp -v {} final-assets/ \;

          # 2. Feed the Nucleus Generator (Windows)
          cp final-assets/*.msi temp-metadata/release-assets-Windows/ 2>/dev/null || true
          cp final-assets/*win*.exe temp-metadata/release-assets-Windows/ 2>/dev/null || true
          cp final-assets/*win*.zip temp-metadata/release-assets-Windows/ 2>/dev/null || true
          
          # 3. Feed the Nucleus Generator (Linux)
          cp final-assets/*.deb temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*.rpm temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*.AppImage temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*.flatpak temp-metadata/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*linux*.zip temp-metadata/release-assets-Linux/ 2>/dev/null || true

      - name: Generate Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: temp-metadata
          version: ${{ github.ref_name }}

      - name: Final Cleanup
        run: |
          if [ -d "temp-metadata/update-yml" ]; then
            mv temp-metadata/update-yml/*.yml final-assets/
          fi
          rm -rf temp-metadata
          ls -R final-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-assets/*
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}