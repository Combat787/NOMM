name: Build and Release (Windows & Linux)

on:
  push:
    tags:
      - '*' # Triggers on any tag (e.g., 1.0.0, v2.0, beta)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build All Formats
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Robust Upload: We use a wildcard at the start to ensure we catch 
      # the project name even if it's not named 'composeApp'
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.os }}
          path: "**/build/compose/binaries/main-release/**/*"
          if-no-files-found: error # This will make the BUILD job fail if files are missing
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Work Directory
        run: mkdir -p all-artifacts

      # Download into subfolders to avoid any naming collisions
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-files
          pattern: app-artifacts-*
          merge-multiple: false

      # Improved Flattening Script: Moves every file from any depth 
      # inside 'downloaded-files' into one flat 'final-assets' folder.
      - name: Flatten and Prepare Assets
        run: |
          mkdir -p final-assets
          find downloaded-files -type f -exec cp -v {} final-assets/ \;
          echo "Final asset list:"
          ls final-assets

      # Re-generates metadata based on the COMPLETE set of binaries
      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: final-assets

      - name: Publish Release
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts-path: final-assets
          tag: ${{ github.ref_name }}
          release-type: 'release'
