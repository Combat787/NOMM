name: Build and Release (Windows & Linux)

on:
  push:
    tags:
      - '*' # Triggers on standard version tags (e.g., v1.0.0)
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Required to create the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Official Nucleus Setup
      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      # 2. Linux Dependencies (Only runs on Ubuntu)
      # Fixes the Flatpak status 1 error and RPM/Deb missing tool errors
      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      # 3. Fix Unix Permissions (Fixes Exit Code 126)
      - name: Make Gradlew Executable
        run: chmod +x gradlew

      # 4. Compile & Package
      - name: Build All Formats
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Upload Artifacts (Fixes "No files found" error)
      # Specifically targets the composeApp subfolder used by Nucleus
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.os }}
          path: composeApp/build/compose/binaries/main-release/**/*
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 6. Download & Merge (Fixes missing latest.yml for Windows)
      # Pulls both OS artifacts into the exact same folder
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts-windows-latest
          path: build-artifacts

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts-ubuntu-latest
          path: build-artifacts

      # 7. Generate Auto-Update Metadata
      # Scans build-artifacts to create latest.yml and latest-linux.yml
      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: build-artifacts

      # 8. Publish the Release (Fixes "Unexpected inputs" error)
      - name: Publish Release
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts-path: build-artifacts
          tag: ${{ github.ref_name }} # Fixed parameter name
          release-type: 'release'     # Fixed parameter namet
