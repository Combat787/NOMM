name: Build and Release (Windows & Linux)

on:
  push:
    tags:
      - '*' # Triggers on any tag (e.g., 4.2.0, v1.0.0)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Make Gradlew Executable
        shell: bash
        run: chmod +x gradlew

      - name: Build All Formats
        shell: bash
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-artifacts-${{ matrix.os }}
          path: "**/build/compose/binaries/main-release/**/*"
          if-no-files-found: error
          retention-days: 1
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
  
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: downloaded-files
          pattern: app-artifacts-*
          merge-multiple: false
  
      - name: Flatten and Prepare Assets
        run: |
          mkdir -p final-assets
          # Find all binaries and move them to the root of final-assets
          find downloaded-files -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.zip" -o -name "*.deb" -o -name "*.rpm" -o -name "*.flatpak" -o -name "*.AppImage" \) -exec cp -v {} final-assets/ \;
          
          # CRITICAL FIX: The Nucleus metadata action expects a specific structure.
          # Since we flattened it, we will move the files into a structure it understands
          # so it actually generates the YMLs.
          mkdir -p final-assets/release-assets-Windows
          mkdir -p final-assets/release-assets-Linux
          
          # Copy windows files to windows folder, linux to linux for the generator
          cp final-assets/*win* final-assets/release-assets-Windows/ 2>/dev/null || true
          cp final-assets/*linux* final-assets/release-assets-Linux/ 2>/dev/null || true
          cp final-assets/*amd64* final-assets/release-assets-Linux/ 2>/dev/null || true
  
      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: final-assets
          version: ${{ github.ref_name }}
  
      - name: Move Metadata to Root
        run: |
          # Move the generated YMLs from the subfolder back to the root of final-assets
          if [ -d "final-assets/update-yml" ]; then
            mv final-assets/update-yml/*.yml final-assets/
          fi
          # Clean up the dummy folders so they aren't uploaded
          rm -rf final-assets/release-assets-Windows
          rm -rf final-assets/release-assets-Linux
          rm -rf final-assets/update-yml
          
          echo "--- Final Assets to be Uploaded ---"
          ls -F final-assets
  
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: final-assets/*
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}