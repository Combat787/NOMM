name: Build and Release (Windows & Linux)

on:
  push:
    tags:
      - '*' # Triggers on any tag pushed
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} Formats
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Nucleus Environment
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main

      - name: Install Linux Packaging Tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build All Formats
        run: ./gradlew packageReleaseDistributionForCurrentOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-artifacts-${{ matrix.os }}
          path: composeApp/build/compose/binaries/main-release/**/*
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts-windows-latest
          path: build-artifacts/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-artifacts-ubuntu-latest
          path: build-artifacts/linux

      # This step moves files out of OS-specific subfolders into a single directory.
      # This is critical for generate-update-yml to produce both latest.yml and latest-linux.yml.
      - name: Flatten Artifacts
        run: |
          mkdir -p final-assets
          find build-artifacts -type f -exec cp {} final-assets/ \;
          ls -R final-assets # Debugging line to verify files in logs

      - name: Generate Auto-Update Metadata
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: final-assets

      - name: Publish Release
        uses: kdroidFilter/Nucleus/.github/actions/publish-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          artifacts-path: final-assets
          tag: ${{ github.ref_name }}
          release-type: 'release'
